<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SkillPro Institute</title>
    <link rel="stylesheet" href="register.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="registration-container">
        <div class="registration-form-wrapper">
            <div class="registration-header">
                <div class="logo">
                    <img src="SkillEdge.jpg" alt="SkillPro Logo" class="logo-image">
                    <span class="logo-text">SkillPro Institute</span>
                </div>
                <h2>Create Your Account</h2>
                <p>Join us to build your future with SkillPro Institute.</p>
            </div>

            <form class="registration-form" id="registrationForm" action="#" method="POST">
                <div class="role-selection">
                    <label>I am a:</label>
                    <select id="userRole" name="userRole">
                        <option value="Student" selected>Student</option>
                        <option value="Admin">Admin</option>
                        <option value="Instructor">Instructor</option>
                    </select>
                </div>

                <div class="form-group">
                    <div class="icon-input">
                        <i class="fas fa-user"></i>
                        <input type="text" id="fullName" name="fullName" placeholder="Full Name" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="icon-input">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="Email" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="icon-input">
                        <i class="fas fa-phone-alt"></i>
                        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Phone Number" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="icon-input password-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Password" required>
                        <span class="toggle-password" onclick="togglePasswordVisibility('password')"><i class="far fa-eye"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="icon-input password-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                        <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')"><i class="far fa-eye"></i></span>
                    </div>
                </div>

                <div class="form-group">
                    <div class="icon-input">
                        <i class="fas fa-calendar-alt"></i>
                        <input type="date" id="dateOfBirth" name="dateOfBirth" required>
                    </div>
                </div>

                <div class="form-group register-code-field" id="registerCodeGroup" style="display: none;">
                    <div class="icon-input">
                        <i class="fas fa-shield-alt"></i>
                        <input type="text" id="registerCode" name="registerCode" placeholder="Register Code" pattern="[0-9]{4}">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="icon-input">
                        <i class="fas fa-key"></i>
                        <input type="text" id="forgotPin" name="forgotPin" placeholder="Forgot Pin (4 digits)" pattern="[0-9]{4}" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Register</button>

                <div class="login-link">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </form>
        </div>
    </div>
    <script src="register.js"></script>
</body>
</html>
